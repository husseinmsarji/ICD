# Docker Compose for local use (single user today, scalable later).
#
# Build context is the repo root so the image can include BOTH the icdgen core
# library and the icdweb backend/frontend. Run from the repo root:
#
#   docker compose -f icdweb/docker-compose.yml up --build
#
# Then open http://localhost:8000
#
# Data (projects + generated artifacts) persists in the named volume `icd_data`.
services:
  icdgen-editor:
    build:
      context: ..                      # repo root (contains icdgen/ and icdweb/)
      dockerfile: icdweb/Dockerfile
    image: icdgen-editor:latest
    ports:
      - "8000:8000"
    environment:
      ICDGEN_DATA_DIR: /data
      ICDGEN_STATIC_DIR: /app/static
      # Same-origin in this single-container setup, so CORS can stay closed.
      ICDGEN_CORS_ORIGINS: ""
    volumes:
      - icd_data:/data
    restart: unless-stopped

volumes:
  icd_data:
